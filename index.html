
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRYET | Wear Your Identity</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.45);
backdrop-filter:blur(12px);
z-index:999;
}

.logo{
font-size:32px;
font-weight:700;
letter-spacing:8px;
}

nav a{
color:white;
text-decoration:none;
margin-left:35px;
font-size:15px;
transition:.3s;
}

nav a:hover{
opacity:.6;
}

.hero{

height:100vh;

background:url("https://images.unsplash.com/photo-1523381210434-271e8be1f52b?auto=format&fit=crop&w=1800&q=80");

background-size:cover;

background-position:center;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

position:relative;

}

.hero::before{

content:"";

position:absolute;

width:100%;

height:100%;

background:rgba(0,0,0,.55);

}

.content{

position:relative;

z-index:2;

}

.content h1{

font-size:90px;

letter-spacing:12px;

}

.content h2{

margin-top:20px;

font-weight:300;

font-size:30px;

}

.content p{

margin-top:30px;

max-width:700px;

line-height:1.8;

margin-left:auto;

margin-right:auto;

color:#ddd;

}

.btn{

display:inline-block;

margin-top:45px;

padding:18px 55px;

border:2px solid white;

color:white;

text-decoration:none;

border-radius:40px;

transition:.4s;

}

.btn:hover{

background:white;

color:black;

}

section{

padding:120px 10%;

}

.title{

font-size:45px;

margin-bottom:70px;

text-align:center;

}

.products{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

gap:40px;

}

.card{

background:#111;

border-radius:20px;

overflow:hidden;

transition:.4s;

}

.card:hover{

transform:translateY(-10px);

}

.card img{

width:100%;

height:360px;

object-fit:cover;

}

.info{

padding:25px;

}

.info h3{

margin-bottom:12px;

}

.price{

font-size:22px;

margin:20px 0;

}

.buy{

display:inline-block;

padding:14px 30px;

background:white;

color:black;

text-decoration:none;

border-radius:40px;

font-weight:bold;

}

footer{

padding:70px;

text-align:center;

background:#050505;

color:#999;

}

</style>

</head>

<body>

<header>

<div class="logo">HRYET</div>

<nav>

<a href="#">Home</a>

<a href="#">Shop</a>

<a href="#">About</a>

<a href="#">Contact</a>

</nav>

</header>

<div class="content">

<p>

Luxury fashion merged with digital identity.

</p>

<a class="btn" href="#shop">

Explore Collection

</a>

</div>

</section>

<section id="shop">

<h2 class="title">

Featured Collection

</h2>

<div class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=900&q=80">

<div class="info">

<h3>Identity Tee</h3>

<div class="price">$39</div>

<a href="#" class="buy">Buy Now</a>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=900&q=80">

<div class="info">

<h3>Premium Hoodie</h3>

<div class="price">$79</div>

</div>

</div>

</div>
