<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mi Perfil | HRYET</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/perfil.css">

</head>

<body>

<header>

    <div class="logo">
        HRYET
    </div>

    <nav>

        <a href="index.html">Inicio</a>
        <a href="store.html">Tienda</a>
        <a href="dashboard.html">Panel</a>
        <a href="login.html">Salir</a>

    </nav>

</header>

<section class="profile">

    <div class="profile-card">

        <img src="images/avatar.png" alt="Foto de perfil">

        <h1 id="userName">
            Tu Nombre
        </h1>

        <p id="userBio">
            Tu identidad digital comienza aquí.
        </p>

        <button>
            Editar Perfil
        </button>

    </div>

</section>

<section class="stats">

    <div class="stat-card">

        <h2>QR Escaneado</h2>

        <h1 id="scanCount">
            0
        </h1>

    </div>

    <div class="stat-card">

        <h2>Likes</h2>

        <h1 id="likesCount">
            0
        </h1>

    </div>

    <div class="stat-card">

        <h2>Visitas</h2>

        <h1 id="visitCount">
            0
        </h1>

    </div>

</section>

<section class="socials">

    <h2>Mis Redes Sociales</h2>

    <div class="social-buttons">

        <a href="#" target="_blank">
            Instagram
        </a>

        <a href="#" target="_blank">
            TikTok
        </a>

        <a href="#" target="_blank">
            Facebook
        </a>

        <a href="#" target="_blank">
            YouTube
        </a>

        <a href="#" target="_blank">
            Sitio Web
        </a>

    </div>

</section>

<section class="qr">

    <h2>Mi Código QR</h2>

    <img src="images/qr-demo.png" alt="Código QR">

</section>

<footer>

    <p>
        © 2026 HRYET
    </p>

</footer>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/profile.js"></script>

</body>

</html>
