<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro | HRYET</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">

<h1>Crear cuenta</h1>

<form id="registerForm">

<input
type="text"
id="nombre"
placeholder="Nombre completo"
required>

<input
type="text"
id="username"
placeholder="Nombre de usuario"
required>

<input
type="email"
id="correo"
placeholder="Correo electrónico"
required>

<input
type="password"
id="password"
placeholder="Contraseña"
required>

<button type="submit">

Crear cuenta

</button>

</form>

<p>

¿Ya tienes cuenta?

<a href="login.html">

Iniciar sesión

</a>

</p>

</div>

<script type="module" src="../js/auth.js"></script>

</body>

</html>
