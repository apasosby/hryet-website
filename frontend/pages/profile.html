<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfil | HRYET</title>

<link rel="stylesheet" href="../css/perfil.css">

</head>

<body>

<header>

<div class="logo">

HRYET

</div>

<nav>

<a href="../index.html">Inicio</a>

<a href="dashboard.html">Dashboard</a>

<a href="store.html">Tienda</a>

</nav>

</header>

<main class="profile">

<div class="profile-card">

<img
id="fotoPerfil"
src="https://via.placeholder.com/180"
alt="Foto de Perfil">

<h1 id="userName">

Usuario

</h1>

<p id="bio">

Tu identidad digital comienza aquí.

</p>

<div class="stats">

<div>

<h2 id="likesCount">0</h2>

<p>❤️ Likes</p>

</div>

<div>

<h2 id="followersCount">0</h2>

<p>👥 Seguidores</p>

</div>

<div>

<h2 id="scanCount">0</h2>

<p>📷 Escaneos</p>

</div>

</div>

<div class="social">

<a id="instagram" href="#" target="_blank">

Instagram

</a>

<a id="facebook" href="#" target="_blank">

Facebook

</a>

<a id="tiktok" href="#" target="_blank">

TikTok

</a>

</div>

<h2>

🎵 Música

</h2>

<iframe

id="spotify"

style="border-radius:12px"

src=""

width="100%"

height="152"

frameborder="0"

allowfullscreen

loading="lazy">

</iframe>

<h2>

📷 Mi QR

</h2>

<input

type="text"

id="qrLink"

readonly>

<button onclick="copiarQR()">

Copiar enlace

</button>

<br><br>

<button id="likeButton">

❤️ Dar Like

</button>

</div>

</main>

<script type="module" src="../js/profile.js"></script>

<script type="module" src="../js/qr.js"></script>

<script type="module" src="../js/auth.js"></script>

</body>

</html>
