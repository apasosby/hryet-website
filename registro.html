<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Únete a la Identidad HRYET</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body style="background: #000; display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div class="glass" style="width: 100%; max-width: 400px; padding: 40px; border-radius: 30px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px);">
        <h2 style="text-align: center; margin-bottom: 30px; letter-spacing: 5px;">HRYET</h2>
        <form>
            <input type="text" placeholder="Nombre de usuario" style="width: 100%; padding: 15px; margin-bottom: 15px; background: #111; border: 1px solid #222; color: white; border-radius: 12px;">
            <input type="email" placeholder="Correo electrónico" style="width: 100%; padding: 15px; margin-bottom: 15px; background: #111; border: 1px solid #222; color: white; border-radius: 12px;">
            <input type="password" placeholder="Contraseña" style="width: 100%; padding: 15px; margin-bottom: 25px; background: #111; border: 1px solid #222; color: white; border-radius: 12px;">
            
            <button type="submit" style="width: 100%; padding: 18px; background: #bc13fe; border: none; color: white; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(188,19,254,0.4);">CREAR CUENTA</button>
        </form>
        <p style="text-align: center; margin-top: 20px; font-size: 12px; color: #888;">¿Ya tienes cuenta? <a href="login.html" style="color: #fff;">Inicia sesión</a></p>
    </div>
</body>
</html>
