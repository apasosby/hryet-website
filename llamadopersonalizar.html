<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personaliza tu HRYET | Wear Your Identity</title>
    <link rel="stylesheet" href="estilo.css">
    <script src="https://kit.fontawesome.com/eb42c38520.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="custom-container" style="display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; background: #000;">
        
        <!-- Vista previa de la camisa -->
        <div class="preview-side" style="display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1a0525, #000);">
            <div style="position: relative; width: 80%;">
                <img id="shirt-base" src="https://images2.imgbox.com/7c/4f/GkLgqD1Y_o.jpg" style="width: 100%; border-radius: 20px; box-shadow: 0 0 50px rgba(188,19,254,0.3);">
                <div id="qr-indicator" style="position: absolute; bottom: 20%; right: 30%; width: 50px; height: 50px; background: #fff; border: 2px solid #bc13fe; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #000; font-weight: bold;">QR</div>
            </div>
        </div>

        <!-- Opciones de personalización -->
        <div class="options-side" style="padding: 60px; background: rgba(10,10,10,0.9); backdrop-filter: blur(20px);">
            <h1 style="font-size: 40px; margin-bottom: 10px;">DISEÑA TU <span style="color: #bc13fe;">HRYET</span></h1>
            <p style="color: #888; margin-bottom: 40px;">Configura tu prenda física y tu destino digital.</p>

            <div class="option-group" style="margin-bottom: 30px;">
                <label style="display: block; font-size: 12px; color: #bc13fe; margin-bottom: 10px;">COLOR DE PRENDA</label>
                <div style="display: flex; gap: 15px;">
                    <div style="width: 30px; height: 30px; background: #000; border: 2px solid #fff; border-radius: 50%; cursor: pointer;"></div>
                    <div style="width: 30px; height: 30px; background: #fff; border-radius: 50%; cursor: pointer;"></div>
                    <div style="width: 30px; height: 30px; background: #f5f5dc; border-radius: 50%; cursor: pointer;"></div>
                </div>
            </div>

            <div class="option-group" style="margin-bottom: 30px;">
                <label style="display: block; font-size: 12px; color: #bc13fe; margin-bottom: 10px;">SUBE TU LOGO (OPCIONAL)</label>
                <input type="file" style="width: 100%; padding: 15px; background: #111; border: 1px dashed #333; color: white;">
            </div>

            <div class="option-group" style="margin-bottom: 30px;">
                <label style="display: block; font-size: 12px; color: #bc13fe; margin-bottom: 10px;">UBICACIÓN DEL QR</label>
                <select style="width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: white; border-radius: 10px;">
                    <option>Pecho (Derecha)</option>
                    <option>Pecho (Centro)</option>
                    <option>Espalda (Cuello)</option>
                    <option>Manga</option>
                </select>
            </div>

            <div style="margin-top: 50px; padding: 30px; border: 1px solid #222; border-radius: 20px;">
                <p style="font-size: 24px; font-weight: 900; margin-bottom: 20px;">$45.00 USD</p>
                <a href="registro.html" style="display: block; background: #fff; color: #000; text-align: center; padding: 18px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s;">CONTINUAR A REGISTRO</a>
            </div>
        </div>
    </div>
</body>
</html>
