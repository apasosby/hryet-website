<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar mi Identidad | HRYET</title>
    <link rel="stylesheet" href="style.css"> <!-- Reutilizamos tu estilo -->
    <style>
        .edit-container { max-width: 500px; margin: 80px auto; padding: 20px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; color: #bc13fe; font-size: 12px; margin-bottom: 8px; letter-spacing: 2px; }
        input, textarea { 
            width: 100%; padding: 15px; background: #111; border: 1px solid #333; 
            color: white; border-radius: 10px; outline: none;
        }
        input:focus { border-color: #bc13fe; }
        .upload-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .upload-box { 
            aspect-ratio: 1; background: #111; border: 1px dashed #444; 
            border-radius: 10px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; font-size: 20px;
        }
        .btn-save { 
            width: 100%; padding: 18px; background: #bc13fe; color: white; 
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px #bc13fe; margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="edit-container">
        <h2 class="section-title">CONFIGURAR PERFIL</h2>
        
        <div class="input-group">
            <label>NOMBRE PÚBLICO</label>
            <input type="text" placeholder="Ej: Henrry">
        </div>

        <div class="input-group">
            <label>USUARIO @</label>
            <input type="text" placeholder="Ej: henrry.hryet">
        </div>

        <div class="input-group">
            <label>TUS REDES (LINKS)</label>
            <input type="text" placeholder="Instagram Link" style="margin-bottom:10px">
            <input type="text" placeholder="TikTok Link" style="margin-bottom:10px">
            <input type="text" placeholder="Facebook Link">
        </div>

        <div class="input-group">
            <label>TUS 7 FOTOS (GALERÍA)</label>
            <div class="upload-grid">
                <div class="upload-box">+</div>
                <div class="upload-box">+</div>
                <div class="upload-box">+</div>
                <div class="upload-box">+</div>
                <div class="upload-box">+</div>
                <div class="upload-box">+</div>
                <div class="upload-box">+</div>
            </div>
        </div>

        <button class="btn-save">GUARDAR IDENTIDAD DIGITAL</button>
    </div>
</body>
</html>
