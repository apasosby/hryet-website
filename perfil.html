<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil HRYET | Identidad Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <!-- Iconos para Redes Sociales -->
    <script src="https://kit.fontawesome.com/eb42c38520.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg: #000;
            --card: #111;
            --accent: #00ff88; /* Verde neón tecnológico */
            --text-main: #fff;
            --text-sec: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .profile-container {
            width: 100%;
            max-width: 500px;
            background: var(--bg);
            padding-bottom: 50px;
        }

        /* --- CABECERA / PERFIL --- */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, #111, #000);
            border-bottom: 1px solid #222;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .name { font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .username { color: var(--accent); font-size: 14px; font-weight: 600; margin-bottom: 20px; display: block; }

        /* --- CONTADOR --- */
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .stat-box { text-align: center; }
        .stat-value { display: block; font-size: 22px; font-weight: 900; }
        .stat-label { font-size: 10px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 2px; }

        /* --- REDES SOCIALES --- */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 20px;
            transition: 0.3s;
            border: 1px solid #222;
        }

        .social-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        /* --- GALERÍA DE 7 FOTOS --- */
        .gallery-title {
            padding: 0 20px 15px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-sec);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            padding: 0 5px;
        }

        /* El primer elemento es más grande para darle estilo Instagram */
        .gallery-item:nth-child(1) { grid-column: span 2; grid-row: span 2; }

        .gallery-item {
            width: 100%;
            aspect-ratio: 1/1;
            background: #111;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        /* --- SECCIÓN DE VENTA (CTA) --- */
        .buy-section {
            margin: 50px 20px 20px;
            padding: 30px;
            background: var(--card);
            border-radius: 20px;
            text-align: center;
            border: 1px dashed var(--accent);
        }

        .buy-section h3 { margin-bottom: 10px; font-size: 18px; }
        .buy-section p { color: var(--text-sec); font-size: 14px; margin-bottom: 20px; }

        .btn-buy {
            background: var(--accent);
            color: #000;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 13px;
            display: inline-block;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 10px;
            color: #333;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="header">
        <!-- Foto de Perfil -->
        <img src="https://via.placeholder.com/150" alt="Foto de Perfil" class="profile-pic">
        
        <!-- Nombre y Apodo -->
        <h1 class="name">Juan Pérez</h1>
        <span class="username">@JUAN_HRYET</span>

        <!-- Contador de Escaneos -->
        <div class="stats">
            <div class="stat-box">
                <span class="stat-value">1,240</span>
                <span class="stat-label">Escaneos</span>
            </div>
            <div class="stat-box">
                <span class="stat-value">850</span>
                <span class="stat-label">Likes</span>
            </div>
        </div>

        <!-- Redes Sociales -->
        <div class="social-links">
            <a href="#" class="social-btn"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-btn"><i class="fab fa-tiktok"></i></a>
            <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
        </div>
    </div>

    <!-- Galería de 7 Fotos -->
    <div class="gallery-title">Galería Personal</div>
    <div class="gallery">
        <div class="gallery-item"><img src="IMG_5617.jpeg"></div>
        <div class="gallery-item"><img src="IMG_5618.jpeg"></div>
        <div class="gallery-item"><img src="IMG_5631.jpeg"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/300"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/300"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/300"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/300"></div>
    </div>

    <!-- Sección de venta -->
    <div class="buy-section">
        <h3>¿Te gustó esta camiseta?</h3>
        <p>Tú también puedes llevar tu identidad al siguiente nivel y ganar premios.</p>
        <a href="index.html" class="btn-buy">Quiero una igual</a>
    </div>

    <footer>
        HRYET DIGITAL IDENTITY CLOTHING © 2026
    </footer>
</div>

</body>
</html>
