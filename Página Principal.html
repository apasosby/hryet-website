<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRYET | Wear Your Identity</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/scrollreveal"></script>
</head>
<body>

    <nav class="glass" style="position:fixed; top:20px; left:50%; transform:translateX(-50%); width:90%; z-index:1000; padding:15px 30px; display:flex; justify-content:space-between; align-items:center;">
        <div class="logo" style="font-weight:900; letter-spacing:5px;">HRYET</div>
        <div class="links">
            <a href="tienda.html" style="color:white; text-decoration:none; margin:0 15px; font-size:12px;">TIENDA</a>
            <a href="login.html" class="btn-premium btn-primary">INGRESAR</a>
        </div>
    </nav>

    <section class="hero" style="height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:0 5%;">
        <canvas id="particles" style="position:absolute; top:0; left:0; z-index:-1;"></canvas>
        <div class="hero-content">
            <h1 style="font-size: clamp(50px, 10vw, 120px); font-weight:900; line-height:0.9;">WEAR YOUR <br><span style="color:var(--accent);">IDENTITY</span></h1>
            <p style="color:var(--text-dim); margin:30px 0; font-size:20px;">La primera firma de moda con ADN digital.</p>
            <a href="registro.html" class="btn-premium btn-primary">CREAR MI IDENTIDAD</a>
            
            <div class="product-preview" style="margin-top:50px;">
                <!-- Usando tu foto de Times Square como modelo de producto -->
                <img src="https://images2.imgbox.com/7c/4f/GkLgqD1Y_o.jpg" class="floating" style="width:300px; border-radius:20px; box-shadow:0 0 50px rgba(188,19,254,0.3);">
            </div>
        </div>
    </section>

    <!-- Sección Reto 10k -->
    <section class="glass" style="margin:100px 5%; padding:80px; text-align:center;">
        <h2 style="font-size:40px;">EL RETO 10,000</h2>
        <p style="margin:20px 0; color:var(--text-dim);">Hazte viral. Si tu camisa llega a 10k escaneos únicos, recibes una prenda edición especial GRATIS.</p>
        <div class="progress-container" style="width:100%; height:10px; background:#222; border-radius:10px; margin-top:40px;">
            <div style="width:65%; height:100%; background:var(--accent); border-radius:10px; box-shadow:0 0 15px var(--accent);"></div>
        </div>
        <p style="margin-top:10px; font-weight:bold;">6,500 / 10,000 ESCANEOS</p>
    </section>

    <script src="main.js"></script>
</body>
</html>
